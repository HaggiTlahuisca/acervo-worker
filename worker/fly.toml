app = "acervo-worker"
primary_region = "lax"

[build]
  dockerfile = "../Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[processes]
  worker = "python worker/worker.py"

[deploy]
  strategy = "immediate"

[[vm]]
  size = "shared-cpu-4x"
  memory = "2048mb"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 20
