app = "acervo-worker"
primary_region = "lax"

[build]
  dockerfile = "../Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[processes]
  worker = "python worker/worker.py"

[deploy]
  strategy = "immediate"

# Evita que Fly apague las maquinas cuando no hay trafico HTTP
[[vm]]
  size = "performance-cpu-8x"
  memory = "16gb"

[http_service]
  internal_port = 8080
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 6
